<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle de Cartões</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans p-4 max-w-md mx-auto">

    <h1 class="text-2xl font-bold text-center my-4 text-gray-800">💳 Meus Cartões e Gastos</h1>

    <!-- ABAS -->
    <div class="flex border-b border-gray-200 mb-4 bg-white rounded-t-lg shadow-sm">
        <button onclick="mudarAba('faturas')" id="btn-faturas" class="w-1/3 py-3 text-center font-medium text-blue-600 border-b-2 border-blue-600">📊 Faturas</button>
        <button onclick="mudarAba('gastos')" id="btn-gastos" class="w-1/3 py-3 text-center font-medium text-gray-500">🛍️ Gasto</button>
        <button onclick="mudarAba('cadastro')" id="btn-cadastro" class="w-1/3 py-3 text-center font-medium text-gray-500">📂 Cartões</button>
    </div>

    <!-- ABA 1: FATURAS -->
    <div id="aba-faturas" class="space-y-4">
        <div class="bg-white p-4 rounded-lg shadow-md flex gap-2">
            <select id="filtro-ano" onchange="atualizarFaturas()" class="w-1/2 p-2 border rounded-md bg-gray-50"></select>
            <select id="filtro-mes" onchange="atualizarFaturas()" class="w-1/2 p-2 border rounded-md bg-gray-50"></select>
        </div>
        <div class="bg-white p-4 rounded-lg shadow-md text-center">
            <p class="text-sm text-gray-500 font-medium uppercase tracking-wider">Total no Mês</p>
            <p id="total-mes" class="text-3xl font-black text-gray-800 mt-1">R$ 0,00</p>
        </div>
        <div id="lista-faturas" class="space-y-2"></div>
    </div>

    <!-- ABA 2: NOVO GASTO -->
    <div id="aba-gastos" class="hidden bg-white p-5 rounded-lg shadow-md space-y-4">
        <h2 class="text-lg font-bold text-gray-700">Lançar Novo Gasto</h2>
        <div>
            <label class="block text-sm font-medium text-gray-600">Cartão</label>
            <select id="gasto-cartao" class="w-full p-2.5 border rounded-md mt-1 bg-gray-50"></select>
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-600">Descrição</label>
            <input type="text" id="gasto-descricao" placeholder="Ex: Mercado" class="w-full p-2.5 border rounded-md mt-1">
        </div>
        <div class="flex gap-2">
            <div class="w-1/2">
                <label class="block text-sm font-medium text-gray-600">Valor Total (R$)</label>
                <input type="number" id="gasto-valor" step="0.01" placeholder="0.00" class="w-full p-2.5 border rounded-md mt-1">
            </div>
            <div class="w-1/2">
                <label class="block text-sm font-medium text-gray-600">Parcelas</label>
                <input type="number" id="gasto-parcelas" value="1" min="1" class="w-full p-2.5 border rounded-md mt-1">
            </div>
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-600">Data da Compra</label>
            <input type="date" id="gasto-data" class="w-full p-2.5 border rounded-md mt-1 bg-gray-50">
        </div>
        <button onclick="salvarGasto()" class="w-full bg-blue-600 text-white p-3 rounded-md font-bold shadow-sm hover:bg-blue-700 transition">Confirmar Gasto</button>
    </div>

    <!-- ABA 3: CADASTRO -->
    <div id="aba-cadastro" class="hidden bg-white p-5 rounded-lg shadow-md space-y-4">
        <h2 class="text-lg font-bold text-gray-700">Meus Cartões</h2>
        <div class="flex gap-2">
            <input type="text" id="novo-cartao" placeholder="Nome do Cartão" class="w-full p-2.5 border rounded-md">
            <button onclick="adicionarCartao()" class="bg-green-600 text-white px-4 rounded-md font-bold hover:bg-green-700">Adicionar</button>
        </div>
        <div id="lista-cartoes" class="divide-y pt-2"></div>
    </div>

    <script>
        // Inicialização dos dados locais (Fica salvo no navegador do seu celular)
        let cartoes = JSON.parse(localStorage.getItem('cartoes')) || ["NuBank", "Itaú"];
        let gastos = JSON.parse(localStorage.getItem('gastas')) || [];

        const mesesNomes = ["Janeiro", "Fevereiro", "Março", "Abril", "Maio", "Junho", "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro"];
        const hoje = new Date();

        // Configurar Filtros de Data iniciais
        const filtroAno = document.getElementById('filtro-ano');
        [2026, 2027, 2028].forEach(ano => {
            filtroAno.add(new Option(ano, ano));
        });
        filtroAno.value = hoje.getFullYear();

        const filtroMes = document.getElementById('filtro-mes');
        mesesNomes.forEach((mes, idx) => {
            filtroMes.add(new Option(mes, idx + 1));
        });
        filtroMes.value = hoje.getMonth() + 1;
        document.getElementById('gasto-data').valueAsDate = hoje;

        function mudarAba(aba) {
            ['faturas', 'gastos', 'cadastro'].forEach(a => {
                document.getElementById(`aba-${a}`).classList.add('hidden');
                document.getElementById(`btn-${a}`).className = "w-1/3 py-3 text-center font-medium text-gray-500";
            });
            document.getElementById(`aba-${aba}`).classList.remove('hidden');
            document.getElementById(`btn-${aba}`).className = "w-1/3 py-3 text-center font-medium text-blue-600 border-b-2 border-blue-600";
            if(aba === 'faturas') atualizarFaturas();
        }

        function atualizarCartoes() {
            const lista = document.getElementById('lista-cartoes');
            const selectGasto = document.getElementById('gasto-cartao');
            lista.innerHTML = '';
            selectGasto.innerHTML = '';
            
            cartoes.forEach(c => {
                lista.innerHTML += `<div class="py-3 text-gray-700 font-medium">💳 ${c}</div>`;
                selectGasto.add(new Option(c, c));
            });
            localStorage.setItem('cartoes', JSON.stringify(cartoes));
        }

        function adicionarCartao() {
            const input = document.getElementById('novo-cartao');
            const nome = input.value.trim();
            if (nome && !cartoes.includes(nome)) {
                cartoes.push(nome);
                atualizarCartoes();
                input.value = '';
            }
        }

        function salvarGasto() {
            const cartao = document.getElementById('gasto-cartao').value;
            const descricao = document.getElementById('gasto-descricao').value.trim();
            const valor = parseFloat(document.getElementById('gasto-valor').value);
            const parcelas = parseInt(document.getElementById('gasto-parcelas').value);
            const dataStr = document.getElementById('gasto-data').value;

            if (!descricao || isNaN(valor) || isNaN(parcelas)) {
                alert('Preencha todos os campos corretamente.');
                return;
            }

            gastos.push({ cartao, descricao, valor, parcelas, data: dataStr });
            localStorage.setItem('gastas', JSON.stringify(gastos));
            
            document.getElementById('gasto-descricao').value = '';
            document.getElementById('gasto-valor').value = '';
            document.getElementById('gasto-parcelas').value = '1';
            
            alert('Gasto registrado!');
            mudarAba('faturas');
        }

        function atualizarFaturas() {
            const anoSel = parseInt(filtroAno.value);
            const mesSel = parseInt(filtroMes.value);
            const container = document.getElementById('lista-faturas');
            container.innerHTML = '';
            
            let totalGeral = 0;

            gastos.forEach(gasto => {
                const valorParcela = gasto.valor / gasto.parcelas;
                const dataOriginal = new Date(gasto.data + 'T00:00:00');

                for (let p = 0; p < gasto.parcelas; p++) {
                    // Simulação simples de avanço de meses para as parcelas
                    let dataParcela = new Date(dataOriginal.getFullYear(), dataOriginal.getMonth() + p, 1);
                    
                    if (dataParcela.getFullYear() === anoSel && (dataParcela.getMonth() + 1) === mesSel) {
                        totalGeral += valorParcela;
                        container.innerHTML += `
                            <div class="bg-white p-3.5 rounded-lg shadow-sm flex justify-between items-center border-l-4 border-blue-500">
                                <div>
                                    <p class="font-bold text-gray-800 text-sm">${gasto.descricao} <span class="text-xs text-gray-400 font-normal">(${p+1}/${gasto.parcelas})</span></p>
                                    <p class="text-xs text-gray-500 font-medium">💳 ${gasto.cartao}</p>
                                </div>
                                <div class="font-bold text-gray-700">R$ ${valorParcela.toFixed(2).replace('.', ',')}</div>
                            </div>`;
                    }
                }
            });

            document.getElementById('total-mes').innerText = `R$ ${totalGeral.toFixed(2).replace('.', ',')}`;
            if (container.innerHTML === '') {
                container.innerHTML = `<p class="text-center text-sm text-gray-400 py-6">Nenhum gasto previsto para este mês.</p>`;
            }
        }

        // Inicialização automática
        atualizarCartoes();
        atualizarFaturas();
    </script>
</body>
</html>
